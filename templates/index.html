<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>InfoStream Media News App</title>

<!-- Bootstrap CSS -->
<link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome CSS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">

<style>

.card {
border: none;
transition: all 0.3s ease-in-out;
box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.card:hover {
transform: translateY(-5px);
box-shadow: 0 8px 16px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div class="container mt-5">

<h1>InfoStream Media News App</h1>

<div class="mb-3">
  <a class="badge badge-primary" href="?topic=politics">Politics</a>
  <a class="badge badge-primary" href="?topic=technology">Technology</a>
  <a class="badge badge-primary" href="?topic=entertainment">Entertainment</a>
</div>

<div class="row">

{% for article in articles %}

<div class="col-md-6 mb-4">

<div class="card">

<img src="{{ article['image'] }}" class="card-img-top" alt="Article Image">

<div class="card-body">

<h5 class="card-title">{{ article['title'] }}</h5>

<p class="card-text">{{ article['content'] }}</p>

<a href="{{ article['source'] }}" class="btn btn-primary">
Read More
</a>

<p class="card-text">
<small class="text-muted">
Published on {{ article['timestamp'] }}
</small>
</p>

</div>

</div>

</div>

{% endfor %}

</div>


<!-- Pagination -->

<nav aria-label="Page navigation example">

<ul class="pagination justify-content-center">

{% if page > 1 %}

<li class="page-item">
<a class="page-link" href="?page={{ page - 1 }}" aria-label="Previous">
<span aria-hidden="true">
<i class="fas fa-chevron-left"></i>
</span>
</a>
</li>

{% endif %}

<li class="page-item disabled">
<a class="page-link" href="#" tabindex="-1" aria-disabled="true">
{{ page }}
</a>
</li>

<li class="page-item">
<a class="page-link" href="?page={{ page + 1 }}" aria-label="Next">
<span aria-hidden="true">
<i class="fas fa-chevron-right"></i>
</span>
</a>
</li>

</ul>

</nav>

</div>

</body>

</html>
